    - "OpenAI OR ChatGPT OR GPT-5 OR Codex OR Sora"
    - "Google DeepMind OR Gemini OR Gemma OR AlphaFold"
    - "Anthropic OR Claude OR Meta AI OR LLaMA OR Llama 4"
    - "Microsoft Copilot OR Azure AI OR xAI OR Grok"
    - "Mistral OR Cohere OR Stability AI OR Midjourney OR Runway OR Perplexity OR Cursor"
    - "DeepSeek OR Baidu ERNIE OR MiniMax OR Moonshot AI OR Kimi"
