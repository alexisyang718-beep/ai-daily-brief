# 科技资讯日报 — 搜索关键词（按板块分类）
# 更新：2026-03-13
# 策略：按板块逐个搜索，每板块 2-3 组关键词。允许跨板块重复（如 Google 同时出现在 AI、手机、科技）。
# 用法：en 用于 Tavily/web_search，zh 用于百度/微信/中文站
# AI 必须使用这些关键词搜索，不要自行编造

# ── 全局（每次必搜，覆盖当日热点）──
global:
  en:
    - "AI news today"
    - "tech news today"
  zh:
    - "AI 最新消息"
    - "科技新闻 今日"

# ── 1. AI 模型与产品 ──
# 搜索时分 2-3 轮：第一轮搜核心公司，第二轮搜中国 AI，第三轮搜趋势
